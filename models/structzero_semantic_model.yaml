name: "structzero_enterprise_analytics"
tables:
  - name: "ENTERPRISE_ANALYTICS_V"
    description: "Contains data about generated architecture blueprints, their scores, targets, latency, and cost."
    base_table:
      database: "STRUCTZERO_DB"
      schema: "ENTERPRISE"
      table: "ENTERPRISE_ANALYTICS_V"
    dimensions:
      - name: "project_name"
        expr: "project_name"
        description: "Name of the project."
        data_type: "varchar"
      - name: "cloud_target"
        expr: "cloud_target"
        description: "The targeted cloud provider (e.g., AWS, GCP, Azure)."
        data_type: "varchar"
      - name: "compliance_target"
        expr: "compliance_target"
        description: "The targeted compliance standard (e.g., PCI-DSS, SOC2, HIPAA)."
        data_type: "varchar"
      - name: "validation_status"
        expr: "validation_status"
        description: "Status of the validation (e.g., APPROVED, REJECTED, APPROVED WITH WARNINGS)."
        data_type: "varchar"
    measures:
      - name: "overall_score"
        expr: "overall_score"
        description: "Overall architecture quality score (0 to 100). Higher is better."
        data_type: "number"
      - name: "security_score"
        expr: "security_score"
        description: "Security score of the architecture (0 to 100)."
        data_type: "number"
      - name: "performance_score"
        expr: "performance_score"
        description: "Performance score of the architecture (0 to 100)."
        data_type: "number"
      - name: "total_latency_ms"
        expr: "total_latency_ms"
        description: "Total time taken to generate the blueprint in milliseconds."
        data_type: "number"
      - name: "estimated_cost_usd"
        expr: "estimated_cost_usd"
        description: "Estimated token cost of the generation process in USD."
        data_type: "number"
